apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- ingress.yaml

namespace: tetris-staging

replicas:
- count: 1
  name: tetris

images:
- name: houssemdhahri93/tetris
  newName: houssemdhahri93/tetris
  newTag: v2.0.0

patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/env
      value:
        - name: APP_ENV
          value: staging
        - name: LOG_LEVEL
          value: debug
  target:
    kind: Deployment
    name: tetris

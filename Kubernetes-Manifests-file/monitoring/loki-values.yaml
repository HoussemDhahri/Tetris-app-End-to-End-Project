deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: standard

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem

monitoring:
  selfMonitoring:
    enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false
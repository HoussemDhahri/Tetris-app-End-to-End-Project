deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: standard

simpleScalable:
  enabled: false

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  auth_enabled: false

  # ✅ هذا هو الحل - schema_config مطلوب
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

monitoring:
  selfMonitoring:
    enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false
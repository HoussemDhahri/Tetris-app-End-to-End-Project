# tetris-dashboard.yaml (ConfigMap)
apiVersion: v1
kind: ConfigMap
metadata:
  name: tetris-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  tetris-dashboard.json: |
    {
      "title": "Tetris App Monitoring",
      "panels": [
        {
          "title": "Pod Status",
          "type": "stat",
          "targets": [{
            "expr": "up{job='tetris'}"
          }]
        },
        {
          "title": "CPU Usage",
          "type": "graph",
          "targets": [{
            "expr": "rate(container_cpu_usage_seconds_total{pod=~'tetris.*'}[5m])"
          }]
        },
        {
          "title": "Memory Usage",
          "type": "graph",
          "targets": [{
            "expr": "container_memory_usage_bytes{pod=~'tetris.*'}"
          }]
        },
        {
          "title": "Pod Restarts",
          "type": "stat",
          "targets": [{
            "expr": "kube_pod_container_status_restarts_total{pod=~'tetris.*'}"
          }]
        },
        {
          "title": "App Logs",
          "type": "logs",
          "datasource": "Loki",
          "targets": [{
            "expr": "{namespace='tetris'}"
          }]
        }
      ]
    }
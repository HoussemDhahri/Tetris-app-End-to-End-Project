apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 58.0.0
      helm:
        skipCrds: true
        valueFiles:
          - $values/Kubernetes-Manifests-file/monitoring/values.yaml

    - repoURL: https://github.com/HoussemDhahri/Tetris-Devsecops-End-to-End-Project.git
      targetRevision: main
      ref: values

    - repoURL: https://github.com/HoussemDhahri/Tetris-Devsecops-End-to-End-Project.git
      targetRevision: main
      path: Kubernetes-Manifests-file/monitoring/dashboards

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.6.2
      helm:
        valueFiles:
          - $values/Kubernetes-Manifests-file/argocd/loki-values.yaml

    - repoURL: https://github.com/HoussemDhahri/Tetris-Devsecops-End-to-End-Project.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true